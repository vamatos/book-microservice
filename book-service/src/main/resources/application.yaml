spring:
  application:
    name: book-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3310/book_service?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: 123
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
    open-in-view: false
  management:
    tracing:
      sampling:
        probability: 1.0
#  zipkin:
#    base-url: ${SPRING_ZIPKIN_BASEURL:http://localhost:9411}
server:
  port: 8100
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
#eureka:
#  client:
#    service-url:
#      defaultZone: http://localhost:8761/eureka

resilience4j:
  retry:
    instances:
      foo-bar:
        max-attempts: 5
        exponential-backoff:
          multiplier: 2
          randomization-factor: 0.5

springdoc:
    api-docs:
      path: /book-service/v3/api-docs
    swagger-ui:
      url: /book-service/v3/api-docs
    override-server-url: true