name: Integration
run-name: Build ${{ github.event.inputs.application  }} by @${{ github.actor }}

on:
    workflow_dispatch:
        inputs:
          application:
            type: choice
            description: 'Select the application to build'
            required: true
            options:
            - book-service
            - exchange-service

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.snapshot_version.outputs.version || steps.patch_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

#      - name: Use custom Maven Settings
#        run: |
#            mkdir -p $HOME/.m2
#            cp .github/maven-settings.xml $HOME/.m2/settings.xml

#      - name: Test (Maven)
#        working-directory: ./${{ github.event.inputs.application }}
#        run: mvn -B -DtrimStrackTrace=true test

      - name: Build Application (Without Tests)
        working-directory: ./${{ github.event.inputs.application }}
        run: mvn clean package -Dmaven.test.skip=true

      - name: Read Version from pom.xml
        working-directory: ./${{ github.event.inputs.application }}
        id: props
        run: |
          version=$(grep -oPm1 "(?<=<version>)[^<]+" pom.xml | sed 's/-SNAPSHOT//')
            echo "version=$version" >> $GITHUB_OUTPUT

      - name: Patch Version
        working-directory: ./${{ github.event.inputs.application }}
        id: patch_version
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "14viniciusandre@gmail.com"
          git fetch --unshallow || true
          git fetch --tags || true
          
          # Lê versão atual (sem -SNAPSHOT)
          current=$(grep -oPm1 "(?<=<version>)[^<]+" pom.xml | head -1 | sed 's/-SNAPSHOT//')
          
          # Incrementa versão patch (ex: 0.0.5 -> 0.0.6)
          new_version=$(echo $current | awk -F. '{print $1"."$2"."$3+1}')
          
          # Atualiza pom.xml com a nova versão
          sed -i "0,/<version>$current-SNAPSHOT<\/version>/{s/<version>$current-SNAPSHOT<\/version>/<version>$new_version-SNAPSHOT<\/version>/}" pom.xml
          
          # Commit e push da nova versão
          git add pom.xml
          git commit -m "Github Actions - Bump version to $new_version"
          git push origin main
          
          echo "APP_VERSION=$new_version" >> $GITHUB_ENV
          echo "version=$new_version" >> $GITHUB_OUTPUT
          echo "APP_NAME=${{ github.event.inputs.application }}" >> $GITHUB_ENV

      - name: Snapshot Version
        id: snapshot_version
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          echo "APP_VERSION=SNAPSHOT-$(date +%s)" >> $GITHUB_ENV
          echo "version=SNAPSHOT-$(date +%s)" >> $GITHUB_OUTPUT
          echo "APP_NAME=${{ github.event.inputs.application }}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./${{ github.event.inputs.application }}
          file: ./${{ github.event.inputs.application }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.application }}:${{ steps.patch_version.outputs.version || steps.snapshot_version.outputs.version }}
          build-args: |
            APPLICATION=${{ github.event.inputs.application }}
            APP_VERSION=${{ env.APP_VERSION }}